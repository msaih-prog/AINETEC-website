<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — AINETEC 2027 Admin</title>
<meta name="robots" content="noindex, nofollow">
<script>
// Capturé avant tout chargement du SDK Supabase : celui-ci nettoie l'URL (hash/code)
// dès son initialisation, donc c'est la seule façon de voir ce que le lien contenait vraiment.
window.__rawIncomingUrl = window.location.href;
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;800;900&family=Work+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --plaster:#f3f1ec; --ink:#15171c; --muted:#5b584f; --line:#cdc7ba;
  --majorelle:#2b3fe0; --majorelle-soft:#dde1fb; --white:#ffffff; --red:#d13a2f; --teal:#1c7a5c;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',ui-sans-serif,system-ui,sans-serif;background:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;}
h1{font-family:'Unbounded',ui-sans-serif,sans-serif;font-weight:800;font-size:1.15rem;margin-bottom:.6rem;}
.subtitle{font-size:.82rem;color:var(--muted);margin-bottom:1.6rem;}
.card{background:var(--white);padding:2.6rem;width:380px;border-radius:3px;}
.kicker{font-family:'IBM Plex Mono';font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--majorelle);margin-bottom:.6rem;}
label{font-size:.78rem;font-weight:600;color:var(--muted);display:block;margin-bottom:.35rem;}
input{width:100%;padding:.75rem .9rem;margin-bottom:1.1rem;border:1px solid var(--line);border-radius:2px;font-size:.9rem;background:var(--plaster);}
input:focus{outline:2px solid var(--majorelle-soft);border-color:var(--majorelle);}
button{width:100%;padding:.85rem;background:var(--majorelle);color:#fff;border:none;border-radius:2px;font-weight:700;cursor:pointer;font-size:.85rem;letter-spacing:.02em;}
button:disabled{opacity:.6;cursor:default;}
#msg{font-size:.8rem;margin-bottom:1rem;display:none;}
#msg.err{color:var(--red);}
#msg.ok{color:var(--teal);}
</style>
</head>
<body>

<div class="card">
  <div class="kicker">AINETEC 2027 — Admin</div>

  <div id="request-view" style="display:none;">
    <h1>Reset your password</h1>
    <p class="subtitle">Enter your admin email — we'll send you a link to set a new password.</p>
    <div id="msg"></div>
    <label for="req-email">Email</label>
    <input id="req-email" type="email" autocomplete="username" placeholder="you@example.com">
    <button id="req-btn" onclick="requestReset()">Send reset link</button>
  </div>

  <div id="password-view" style="display:none;">
    <h1>Set a new password</h1>
    <div id="msg2"></div>
    <label for="pwd1">New password</label>
    <input id="pwd1" type="password" autocomplete="new-password" placeholder="At least 8 characters">
    <label for="pwd2">Confirm password</label>
    <input id="pwd2" type="password" autocomplete="new-password" placeholder="Repeat the password above">
    <button id="submit-btn" onclick="submitNewPassword()">Update password</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
const RESET_REDIRECT = window.location.origin + window.location.pathname;

function showMsg(el, text, isErr) {
  el.textContent = text;
  el.className = isErr ? 'err' : 'ok';
  el.style.display = 'block';
}

function showRequestView(prefillMsg, isErr) {
  document.getElementById('password-view').style.display = 'none';
  document.getElementById('request-view').style.display = 'block';
  if (prefillMsg) showMsg(document.getElementById('msg'), prefillMsg, isErr);
}

function showPasswordView() {
  document.getElementById('request-view').style.display = 'none';
  document.getElementById('password-view').style.display = 'block';
}

async function requestReset() {
  const email = document.getElementById('req-email').value.trim();
  if (!email) { showMsg(document.getElementById('msg'), 'Please enter your email.', true); return; }

  const btn = document.getElementById('req-btn');
  btn.disabled = true;
  btn.textContent = 'Sending…';
  const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: RESET_REDIRECT });
  btn.disabled = false;
  btn.textContent = 'Send reset link';

  if (error) { showMsg(document.getElementById('msg'), error.message, true); return; }
  showMsg(document.getElementById('msg'), 'If an account exists for this email, a reset link has been sent. Check your inbox.', false);
}

sb.auth.onAuthStateChange((event) => {
  if (event === 'PASSWORD_RECOVERY') showPasswordView();
});

// Supabase envoie désormais un lien avec ?code=... (flux PKCE) plutôt qu'un jeton
// dans le hash de l'URL — il faut l'échanger explicitement contre une session.
async function init() {
  const rawUrl = window.__rawIncomingUrl || window.location.href;
  const parsed = new URL(rawUrl);
  const code = parsed.searchParams.get('code');
  const hashParams = new URLSearchParams(parsed.hash.replace(/^#/, ''));
  const hashError = hashParams.get('error_description');

  if (code) {
    const { error } = await sb.auth.exchangeCodeForSession(code);
    if (error) { showRequestView('Your reset link has expired. Request a new one below.', true); return; }
    showPasswordView();
    return;
  }
  if (hashError) {
    showRequestView(decodeURIComponent(hashError).replace(/\+/g, ' ') + ' — request a new link below.', true);
    return;
  }
  const { data: { session } } = await sb.auth.getSession();
  if (session) { showPasswordView(); return; }
  showRequestView();
}
init();

async function submitNewPassword() {
  const msg2 = document.getElementById('msg2');
  const p1 = document.getElementById('pwd1').value;
  const p2 = document.getElementById('pwd2').value;
  if (p1.length < 8) { showMsg(msg2, 'Password must be at least 8 characters.', true); return; }
  if (p1 !== p2) { showMsg(msg2, 'Passwords do not match.', true); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Updating…';

  const { error } = await sb.auth.updateUser({ password: p1 });
  btn.disabled = false;
  btn.textContent = 'Update password';

  if (error) { showMsg(msg2, error.message, true); return; }

  document.getElementById('pwd1').style.display = 'none';
  document.getElementById('pwd2').style.display = 'none';
  document.querySelector('label[for="pwd1"]').style.display = 'none';
  document.querySelector('label[for="pwd2"]').style.display = 'none';
  btn.style.display = 'none';
  showMsg(msg2, 'Password updated. You can now sign in on any admin page with your new password.', false);
}
</script>

</body>
</html>
