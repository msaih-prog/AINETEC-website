<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — AINETEC 2027 Admin</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;800;900&family=Work+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --plaster:#f3f1ec; --ink:#15171c; --muted:#5b584f; --line:#cdc7ba;
  --majorelle:#2b3fe0; --majorelle-soft:#dde1fb; --white:#ffffff; --red:#d13a2f; --teal:#1c7a5c;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',ui-sans-serif,system-ui,sans-serif;background:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;}
h1{font-family:'Unbounded',ui-sans-serif,sans-serif;font-weight:800;font-size:1.15rem;margin-bottom:1.6rem;}
.card{background:var(--white);padding:2.6rem;width:360px;border-radius:3px;}
.kicker{font-family:'IBM Plex Mono';font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--majorelle);margin-bottom:.6rem;}
label{font-size:.78rem;font-weight:600;color:var(--muted);display:block;margin-bottom:.35rem;}
input{width:100%;padding:.75rem .9rem;margin-bottom:1.1rem;border:1px solid var(--line);border-radius:2px;font-size:.9rem;background:var(--plaster);}
input:focus{outline:2px solid var(--majorelle-soft);border-color:var(--majorelle);}
button{width:100%;padding:.85rem;background:var(--majorelle);color:#fff;border:none;border-radius:2px;font-weight:700;cursor:pointer;font-size:.85rem;letter-spacing:.02em;}
button:disabled{opacity:.6;cursor:default;}
#msg{font-size:.8rem;margin-bottom:1rem;display:none;}
#msg.err{color:var(--red);}
#msg.ok{color:var(--teal);}
</style>
</head>
<body>

<div class="card">
  <div class="kicker">AINETEC 2027 — Admin</div>
  <h1>Set a new password</h1>
  <div id="msg"></div>
  <div id="form">
    <label for="pwd1">New password</label>
    <input id="pwd1" type="password" autocomplete="new-password" placeholder="At least 8 characters">
    <label for="pwd2">Confirm password</label>
    <input id="pwd2" type="password" autocomplete="new-password" placeholder="Repeat the password above">
    <button id="submit-btn" onclick="submitNewPassword()">Update password</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
const msg = document.getElementById('msg');
function showMsg(text, isErr) {
  msg.textContent = text;
  msg.className = isErr ? 'err' : 'ok';
  msg.style.display = 'block';
}

let recoveryReady = false;
sb.auth.onAuthStateChange((event) => {
  if (event === 'PASSWORD_RECOVERY') recoveryReady = true;
});

// Supabase envoie désormais un lien avec ?code=... (flux PKCE) plutôt qu'un jeton
// dans le hash de l'URL — il faut l'échanger explicitement contre une session.
async function init() {
  const code = new URLSearchParams(window.location.search).get('code');
  if (code) {
    const { error } = await sb.auth.exchangeCodeForSession(code);
    if (error) {
      showMsg('This reset link is invalid or has expired. Please request a new one.', true);
      return;
    }
    recoveryReady = true;
    return;
  }
  // Repli pour l'ancien flux (jeton dans le hash), déjà détecté automatiquement au chargement.
  const { data: { session } } = await sb.auth.getSession();
  if (session) { recoveryReady = true; return; }
  showMsg('This reset link is invalid or has expired. Please request a new one.', true);
}
init();

async function submitNewPassword() {
  const p1 = document.getElementById('pwd1').value;
  const p2 = document.getElementById('pwd2').value;
  if (p1.length < 8) { showMsg('Password must be at least 8 characters.', true); return; }
  if (p1 !== p2) { showMsg('Passwords do not match.', true); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Updating…';

  const { error } = await sb.auth.updateUser({ password: p1 });
  btn.disabled = false;
  btn.textContent = 'Update password';

  if (error) { showMsg(error.message, true); return; }

  document.getElementById('form').style.display = 'none';
  showMsg('Password updated. You can now sign in on any admin page with your new password.', false);
}

</script>

</body>
</html>
